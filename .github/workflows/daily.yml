name: Daily AI Agent Report

on:
  schedule:
    - cron: '0 0 * * *' # 每日香港時間早上 8 點執行
  workflow_dispatch: # 容許手動啟動測試

# 解決 Node.js 版本警告問題
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: 執行 AI 報告
        env:
          # 記住去 Settings > Secrets > Actions 新增呢粒 Key
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python report_bot.py
