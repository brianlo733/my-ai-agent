name: Daily AI Agent Report

on:
  schedule:
    - cron: '0 0 * * *' # 每日香港時間早上 8 點自動執行
  workflow_dispatch: # 容許你隨時手動撳掣測試

# 解決 Node.js 版本警告，並確保環境穩定
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 檢查程式碼 (Checkout)
        uses: actions/checkout@v4

      - name: 2. 設定 Python 環境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 3. 安裝必要套件 (Requests + BeautifulSoup)
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: 4. 執行 AI 賽馬爬蟲報告
        env:
          # 請確保你在 GitHub Settings > Secrets 已經入好呢粒 Key
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python report_bot.py
