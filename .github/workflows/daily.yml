name: Daily AI Agent Report

on:
  schedule:
    - cron: '0 0 * * *' # 每日香港時間 8 點
  workflow_dispatch: # 俾你手動撳掣執行

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # 解決 Node.js 20 警告

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v5 # 升級到 v5
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install openai

      - name: 執行 AI 報告程式
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python report_bot.py
