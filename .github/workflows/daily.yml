name: Daily AI Agent Report

on:
  schedule:
    # 每日香港時間朝早 8 點執行 (UTC 0:00)
    - cron: '0 0 * * *'
  workflow_dispatch: # 呢行等你可以隨時「手動測試」，唔使等聽朝

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 檢查程式碼
        uses: actions/checkout@v4

      - name: 安裝 Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: 安裝必要套件
        run: |
          python -m pip install --upgrade pip
          pip install google-genai  # <--- 留意呢度轉咗名
      - name: 執行 AI 報告程式
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python report_bot.py
